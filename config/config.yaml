project:
  name: "Healthcare Readmission Predictor"
  version: "1.0.0"
  target: "readmitted_binary"  # 0 = not readmitted, 1 = readmitted <30 days

data:
  raw_path: "data/raw/diabetic_data.csv"
  processed_path: "data/processed/features.parquet"
  test_size: 0.2
  random_state: 42
  val_size: 0.15

features:
  lace_features:
    - time_in_hospital
    - num_emergency
    - num_diagnoses
  clinical_features:
    - num_medications
    - num_procedures
    - num_lab_procedures
    - number_outpatient
    - number_inpatient
    - number_emergency
  comorbidity_features:
    - diag_1
    - diag_2
    - diag_3

model:
  random_state: 42
  n_jobs: -1
  cv_folds: 5
  primary_metric: "roc_auc"

paths:
  models_dir: "models/"
  results_dir: "results/"
  reports_dir: "reports/"
